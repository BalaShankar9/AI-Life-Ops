services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai_life_ops
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: ai_life_ops
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
